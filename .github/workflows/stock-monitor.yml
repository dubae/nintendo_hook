name: Nintendo Switch 2 stock monitor

on:
  schedule:
    - cron: "2-59/5 * * * *"
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Send a Discord test alert instead of checking stock"
        required: false
        default: false
        type: boolean

concurrency:
  group: nintendo-switch2-stock-monitor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      PRODUCT_URL: https://store.nintendo.co.kr/beeskb6aakor
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      REQUEST_TIMEOUT_SECONDS: "20"
      ALERT_ON_START: "true"
      STATE_FILE: .monitor-state.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore monitor state
        uses: actions/cache/restore@v4
        with:
          path: .monitor-state.json
          key: stock-state-${{ github.run_id }}
          restore-keys: |
            stock-state-

      - name: Send Discord test alert
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.test_alert }}
        run: npm run test-alert

      - name: Check stock and notify
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.test_alert }}
        run: npm run check:notify

      - name: Save monitor state
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || !inputs.test_alert) }}
        uses: actions/cache/save@v4
        with:
          path: .monitor-state.json
          key: stock-state-${{ github.run_id }}
